<html>
    <head>
        <title>All rise for the Royals</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }

            :root {
                --text-color__light: #fafafa;
                --text-color__dark: #333;

                --text-color: var(--text-color__dark);
                --gap: 0.3rem;

                --color-graphite--100: black;
                --color-graphite--200: black;
                --color-graphite--300: black;
                --color-graphite--400: black;
                --color-graphite--500: gray;
                --color-graphite--600: white;
                --color-graphite--700: white;
                --color-graphite--800: white;
                --color-graphite--900: white;

                --color-mixed--100: black;
                --color-mixed--200: black;
                --color-mixed--300: black;
                --color-mixed--400: black;
                --color-mixed--500: gray;
                --color-mixed--600: white;
                --color-mixed--700: white;
                --color-mixed--800: white;
                --color-mixed--900: white;
            }

            html {
                font:
                    20pt/1.2 "Georgia",
                    serif;
            }

            body {
                margin: 0;
                padding: 0;
                height: 100svh;

                transition:
                    background-color 0.2s ease-out,
                    color 1s ease-out;
            }

            main {
                padding-inline: 2rem;
                height: 100%;
                display: grid;
                place-content: center;
            }

            footer {
                position: absolute;
                bottom: 0.5rem;
                right: 0.5rem;
                font-size: 0.75rem;
            }

            footer a {
                color: var(--text-color);
            }

            p {
                margin-block: 0.25rem;
                color: var(--text-color);
            }

            .colors {
                isolation: isolate;
                display: grid;
                grid-template-columns: repeat(10, 1fr);
                gap: var(--gap);
            }

            .color {
                height: 3rem;
                aspect-ratio: 1;
                background-color: var(--color);

                &:hover {
                    border: 2px solid gold;
                }
            }

            .colors.top-row > * {
                border-radius: 0.25rem 0.25rem 0 0;
            }

            .colors.bottom-row > * {
                border-radius: 0 0 0.25rem 0.25rem;
            }

            .flex-col-reverse {
                display: flex;
                flex-direction: column-reverse;
            }
        </style>
        <script type="module">
            import Color from "./color.min.js";

            const mixWeights = {
                tints: [0.9, 0.7, 0.5, 0.2],
                shades: [0.2, 0.4, 0.5, 0.6],
            };

            const colorGroups = {
                royals: {
                    root: new Color("#0056ef"),
                    graphite: {
                        tints: [
                            new Color("#ecf2fe"),
                            new Color("#bad3fc"),
                            new Color("#80acfa"),
                            new Color("#387ffa"),
                        ],
                        shades: [
                            new Color("#0044c2"),
                            new Color("#003494"),
                            new Color("#002570"),
                            new Color("#011a4c"),
                        ],
                    },
                },

                grays: {
                    root: new Color("#666666"),
                    graphite: {
                        tints: [
                            new Color("#f0f0f0"),
                            new Color("#d1d1d1"),
                            new Color("#b3b3b3"),
                            new Color("#858585"),
                        ],
                        shades: [
                            new Color("#525252"),
                            new Color("#333333"),
                            new Color("#1f1f1f"),
                            new Color("#0a0a0a"),
                        ],
                    },
                },
            };

            /**
             * @param {string} groupName
             */
            function updateCustomPropsByGroup(groupName) {
                if (colorGroups[groupName]) {
                    const setProp = document.body.style.setProperty.bind(
                        document.body.style,
                    );
                    const group = colorGroups[groupName];

                    const rootColor = group.root;
                    document.body.style.setProperty(
                        "--color-graphite--500",
                        rootColor.toString(),
                    );
                    setProp("--color-mixed--500", rootColor.toString());

                    // tints
                    setProp("--color-graphite--100", group.graphite.tints[0]);
                    setProp("--color-graphite--200", group.graphite.tints[1]);
                    setProp("--color-graphite--300", group.graphite.tints[2]);
                    setProp("--color-graphite--400", group.graphite.tints[3]);
                    setProp(
                        "--color-mixed--100",
                        rootColor.mix("white", mixWeights.tints[0], {
                            space: "srgb",
                        }),
                    );
                    setProp(
                        "--color-mixed--200",
                        rootColor.mix("white", mixWeights.tints[1], {
                            space: "srgb",
                        }),
                    );
                    setProp(
                        "--color-mixed--300",
                        rootColor.mix("white", mixWeights.tints[2], {
                            space: "srgb",
                        }),
                    );
                    setProp(
                        "--color-mixed--400",
                        rootColor.mix("white", mixWeights.tints[3], {
                            space: "srgb",
                        }),
                    );

                    // shades
                    setProp("--color-graphite--600", group.graphite.shades[0]);
                    setProp("--color-graphite--700", group.graphite.shades[1]);
                    setProp("--color-graphite--800", group.graphite.shades[2]);
                    setProp("--color-graphite--900", group.graphite.shades[3]);
                    setProp(
                        "--color-mixed--600",
                        rootColor.mix("black", mixWeights.shades[0], {
                            space: "srgb",
                        }),
                    );
                    setProp(
                        "--color-mixed--700",
                        rootColor.mix("black", mixWeights.shades[1], {
                            space: "srgb",
                        }),
                    );
                    setProp(
                        "--color-mixed--800",
                        rootColor.mix("black", mixWeights.shades[2], {
                            space: "srgb",
                        }),
                    );
                    setProp(
                        "--color-mixed--900",
                        rootColor.mix("black", mixWeights.shades[3], {
                            space: "srgb",
                        }),
                    );
                }
            }

            document.addEventListener("DOMContentLoaded", () => {
                const bodyStyle = document.body.style;
                document.querySelectorAll("span.color").forEach((el) => {
                    const isDarkerColor = el.dataset["darker"] !== undefined;
                    el.addEventListener("mouseover", () => {
                        bodyStyle.backgroundColor =
                            el.style.getPropertyValue("--color");
                        bodyStyle.setProperty(
                            "--text-color",
                            isDarkerColor
                                ? "var(--text-color__light)"
                                : "var(--text-color__dark)",
                        );
                    });
                    el.addEventListener("mouseout", () => {
                        bodyStyle.backgroundColor = "white";
                        bodyStyle.setProperty(
                            "--text-color",
                            "var(--text-color__dark)",
                        );
                    });
                });

                updateCustomPropsByGroup("royals");
            });

            document.addEventListener("input", ({ target }) => {
                if (target.dataset["colorsSelect"] !== globalThis.undefined) {
                    updateCustomPropsByGroup(target.value);
                }
            });
        </script>
    </head>
    <body>
        <header>
            <select data-colors-select>
                <option value="royals" selected>Royals</option>
                <option value="grays">Grays</option>
            </select>
        </header>
        <main>
            <section>
                <p>Graphite</p>
                <div class="colors top-row">
                    <span
                        class="color"
                        style="--color: var(--color-graphite--100)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-graphite--200)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-graphite--300)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-graphite--400)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-graphite--500)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-graphite--600)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-graphite--700)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-graphite--800)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-graphite--900)"
                    ></span>
                </div>
            </section>
            <section class="flex-col-reverse">
                <p>Mixed from root color</p>
                <div class="colors bottom-row">
                    <span
                        class="color"
                        style="--color: var(--color-mixed--100)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-mixed--200)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-mixed--300)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-mixed--400)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-mixed--500)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-mixed--600)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-mixed--700)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-mixed--800)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-mixed--900)"
                    ></span>
                </div>
            </section>
        </main>
        <footer>
            <a
                href="https://github.com/oanderson-rw/royals/blob/main/index.html"
                >code</a
            >
        </footer>
    </body>
</html>
