<html>
    <head>
        <title>All rise for the Royals</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }

            :root {
                --text-color__light: #fafafa;
                --text-color__dark: #333;

                --text-color: var(--text-color__dark);
                --gap: 0.3rem;

                --color-top-row--100: black;
                --color-top-row--200: black;
                --color-top-row--300: black;
                --color-top-row--400: black;
                --color-top-row--500: gray;
                --color-top-row--600: white;
                --color-top-row--700: white;
                --color-top-row--800: white;
                --color-top-row--900: white;

                --color-bottom-row--100: black;
                --color-bottom-row--200: black;
                --color-bottom-row--300: black;
                --color-bottom-row--400: black;
                --color-bottom-row--500: gray;
                --color-bottom-row--600: white;
                --color-bottom-row--700: white;
                --color-bottom-row--800: white;
                --color-bottom-row--900: white;
            }

            html {
                font:
                    20pt/1.2 "Georgia",
                    "EB Garamond",
                    serif;
            }

            body {
                margin: 0;
                padding: 0;
                height: 100svh;

                transition:
                    background-color 0.2s ease-out,
                    color 1s ease-out;
            }

            main {
                padding-inline: 2rem;
                height: 100%;
                display: grid;
                place-content: center;
            }

            footer {
                position: absolute;
                bottom: 0.5rem;
                right: 0.5rem;
                font-size: 0.75rem;
            }

            footer a {
                color: var(--text-color);
            }

            p {
                margin-block: 0.25rem;
                color: var(--text-color);
            }

            select {
                font: inherit;
                border: none;
                border-bottom: 2px solid #ccc;
                background-color: transparent;
            }

            .colors {
                isolation: isolate;
                display: grid;
                grid-template-columns: repeat(10, 1fr);
                gap: var(--gap);

                --row-buffer: 0.5rem;
                &.top-row {
                    margin-block-start: var(--row-buffer);
                }

                &.bottom-row {
                    margin-block-end: var(--row-buffer);
                }
            }

            .color {
                height: 3rem;
                aspect-ratio: 1;
                background-color: var(--color);

                &:hover {
                    border: 2px solid gold;
                }
            }

            .colors.top-row > * {
                border-radius: 0.25rem 0.25rem 0 0;
            }

            .colors.bottom-row > * {
                border-radius: 0 0 0.25rem 0.25rem;
            }

            .flex-col-reverse {
                display: flex;
                flex-direction: column-reverse;
            }
        </style>
        <script type="module">
            import Color from "./color.min.js";

            const notesMap = Object.freeze({
                graphite: "*",
                rnPlatform: "‡",
                nfPlatform: "§",
                mixed: "†",
                brand: "‖",
            });

            const mixWeights = Object.freeze({
                tints: [0.9, 0.7, 0.5, 0.2],
                shades: [0.2, 0.4, 0.5, 0.6],
            });

            /**
             * @param {Color} rootColor
             */
            function getMixesCollectionFromRoot(rootColor) {
                if (!(rootColor instanceof Color)) {
                    rootColor = new Color(rootColor);
                }

                return [
                    rootColor.mix("white", mixWeights.tints[0], {
                        space: "srgb",
                    }),
                    rootColor.mix("white", mixWeights.tints[1], {
                        space: "srgb",
                    }),
                    rootColor.mix("white", mixWeights.tints[2], {
                        space: "srgb",
                    }),
                    rootColor.mix("white", mixWeights.tints[3], {
                        space: "srgb",
                    }),
                    rootColor,
                    rootColor.mix("black", mixWeights.shades[0], {
                        space: "srgb",
                    }),
                    rootColor.mix("black", mixWeights.shades[1], {
                        space: "srgb",
                    }),
                    rootColor.mix("black", mixWeights.shades[2], {
                        space: "srgb",
                    }),
                    rootColor.mix("black", mixWeights.shades[3], {
                        space: "srgb",
                    }),
                ];
            }

            const royalRoot = new Color("#0056ef"); // aka "Circuit"

            const colorGroups = {
                royalsGraphite: {
                    displayName: "Royals",
                    colors: [
                        new Color("#ecf2fe"),
                        new Color("#bad3fc"),
                        new Color("#80acfa"),
                        new Color("#387ffa"),
                        royalRoot,
                        new Color("#0044c2"),
                        new Color("#003494"),
                        new Color("#002570"),
                        new Color("#011a4c"),
                    ],
                    notes: ["graphite", "brand"],
                },
                royalsMixed: {
                    displayName: "Royals",
                    colors: getMixesCollectionFromRoot(royalRoot),
                    notes: ["mixed", "rnPlatform", "nfPlatform"],
                },
                cobalts: {
                    displayName: "Cobalts",
                    colors: getMixesCollectionFromRoot("#2a3690"),
                    notes: ["mixed", "rnPlatform"],
                },
                midnights: {
                    displayName: "Midnights",
                    colors: getMixesCollectionFromRoot("#141c44"),
                    notes: ["mixed", "rnPlatform"],
                },
                sunsets: {
                    displayName: "Sunsets",
                    colors: getMixesCollectionFromRoot("#ff5340"),
                    notes: ["mixed", "rnPlatform"],
                },
                flames: {
                    displayName: "Flames",
                    colors: getMixesCollectionFromRoot("#ff634f"),
                    notes: ["mixed", "brand"],
                },
                turbos: {
                    displayName: "Turbos",
                    colors: getMixesCollectionFromRoot("#e1e31c"),
                    notes: ["mixed", "rnPlatform"],
                },
                sparks: {
                    displayName: "Sparks",
                    colors: getMixesCollectionFromRoot("#e4ed57"),
                    notes: ["mixed", "brand"],
                },
            };

            /**
             * @param {string} groupName
             * @param {"top" | "bottom"} row
             */
            function updateCustomPropsByGroup(groupName, row) {
                if (colorGroups[groupName]) {
                    const setProp = document.body.style.setProperty.bind(
                        document.body.style,
                    );
                    const groupColors = colorGroups[groupName].colors;
                    const customPropBase =
                        row === "top" ? "color-top-row" : "color-bottom-row";

                    for (let colIdx = 0; colIdx < 9; colIdx++) {
                        const propName = `--${customPropBase}--${colIdx * 100 + 100}`;
                        setProp(propName, groupColors[colIdx].toString());
                    }
                }
            }

            function populateColorSelects() {
                const groupKeys = Object.keys(colorGroups);
                const selectOptionData = groupKeys.map((key) => [
                    key,
                    colorGroups[key].displayName,
                    colorGroups[key].notes,
                ]);

                Array.from(
                    document.querySelectorAll("select[data-colors-select]"),
                ).forEach((selectEl) => {
                    selectOptionData.forEach(([key, name, notes]) => {
                        const optionEl = document.createElement("option");
                        optionEl.value = key;

                        let innerText = name;
                        Object.keys(notesMap).forEach((noteType) => {
                            if (notes.includes(noteType)) {
                                innerText += notesMap[noteType];
                            }
                        });
                        optionEl.innerText = innerText;

                        selectEl.appendChild(optionEl);
                    });
                });
            }

            document.addEventListener("DOMContentLoaded", () => {
                const bodyStyle = document.body.style;
                document.querySelectorAll("span.color").forEach((el) => {
                    const isDarkerColor = el.dataset["darker"] !== undefined;
                    el.addEventListener("mouseover", () => {
                        bodyStyle.backgroundColor =
                            el.style.getPropertyValue("--color");
                        bodyStyle.setProperty(
                            "--text-color",
                            isDarkerColor
                                ? "var(--text-color__light)"
                                : "var(--text-color__dark)",
                        );
                    });
                    el.addEventListener("mouseout", () => {
                        bodyStyle.backgroundColor = "white";
                        bodyStyle.setProperty(
                            "--text-color",
                            "var(--text-color__dark)",
                        );
                    });
                });

                populateColorSelects();

                updateCustomPropsByGroup("royalsGraphite", "top");
                updateCustomPropsByGroup("royalsMixed", "bottom");
            });

            document.addEventListener("input", ({ target }) => {
                const isTarget = (datasetPropName) =>
                    target.dataset[datasetPropName] !== globalThis.undefined;

                if (isTarget("colorsSelectTop")) {
                    updateCustomPropsByGroup(target.value, "top");
                }

                if (isTarget("colorsSelectBottom")) {
                    updateCustomPropsByGroup(target.value, "bottom");
                }
            });
        </script>
    </head>
    <body>
        <main>
            <section>
                <label for="colors-select__top-row">Top row:</label>
                <select
                    data-colors-select
                    data-colors-select-top
                    id="colors-select__top-row"
                ></select>
                <div class="colors top-row">
                    <span
                        class="color"
                        style="--color: var(--color-top-row--100)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-top-row--200)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-top-row--300)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-top-row--400)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-top-row--500)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-top-row--600)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-top-row--700)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-top-row--800)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-top-row--900)"
                    ></span>
                </div>
            </section>
            <section class="flex-col-reverse">
                <div>
                    <label for="colors-select__bottom-row">Bottom row:</label>
                    <select
                        data-colors-select
                        data-colors-select-bottom
                        id="colors-select__bottom-row"
                    ></select>
                </div>
                <div class="colors bottom-row">
                    <span
                        class="color"
                        style="--color: var(--color-bottom-row--100)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-bottom-row--200)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-bottom-row--300)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-bottom-row--400)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-bottom-row--500)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-bottom-row--600)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-bottom-row--700)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-bottom-row--800)"
                    ></span>
                    <span
                        class="color"
                        style="--color: var(--color-bottom-row--900)"
                    ></span>
                </div>
            </section>
            <p>
                Option symbols legend:
                <ul>
                <li>*: Exists in Graphite</li>
                <li>‡: Exists in RN Platform</li>
                <li>§: Exists in NF Platform</li>
                <li>†: Colors mixed based on root color</li>
                <li>‖: Root color is brand color</li>
                </ul>
            </p>
        </main>
        <footer>
            <a
                href="https://github.com/oanderson-rw/royals/blob/main/index.html"
                >code</a
            >
        </footer>
    </body>
</html>
